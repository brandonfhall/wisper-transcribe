{# Sidebar system status partial — returned by /api/sidebar-status, polled every 5s #}
<div style="padding:12px 10px;border-top:1px solid var(--color-rule);font-family:var(--font-mono);font-size:10px;color:var(--color-paper-faint);line-height:1.8">
  <div style="display:flex;justify-content:space-between;align-items:center">
    <span>DEVICE</span>
    <span style="color:var(--color-signal-green)">● {{ device or "cpu" }}</span>
  </div>
  <div style="display:flex;justify-content:space-between;align-items:center">
    <span>JOBS</span>
    <span style="color:{% if active_jobs > 0 %}var(--color-accent){% else %}var(--color-paper-faint){% endif %}">
      {% if active_jobs > 0 %}{{ active_jobs }} active{% else %}—{% endif %}
    </span>
  </div>
</div>
