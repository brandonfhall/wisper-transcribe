{# Recent transcripts partial — polled by the dashboard archive section #}
{% if transcripts %}
{% for t in transcripts %}
<a href="/transcripts/{{ t.stem | urlencode }}"
   style="display:grid;grid-template-columns:1fr 160px 70px;gap:18px;align-items:baseline;
          padding:14px 0;border-bottom:1px solid var(--color-rule);
          text-decoration:none;color:inherit;transition:background 120ms"
   onmouseover="this.style.background='var(--color-ink-700)'"
   onmouseout="this.style.background=''">
  <div style="font-family:var(--font-serif);font-size:16px;color:var(--color-paper)">{{ t.title }}</div>
  <div style="font-family:var(--font-mono);font-size:11px;color:var(--color-paper-dim);text-align:right">{{ t.duration or '—' }}</div>
  <div style="font-family:var(--font-mono);font-size:11px;color:var(--color-paper-faint);text-align:right">{{ t.date_processed or '—' }}</div>
</a>
{% endfor %}
{% else %}
<div style="padding:14px 0;color:var(--color-paper-faint);font-size:13px;font-style:italic">
  No transcripts yet. <a href="/transcribe" style="color:var(--color-accent)">Start one →</a>
</div>
{% endif %}
