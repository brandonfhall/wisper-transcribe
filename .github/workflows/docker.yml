name: Docker Build

# Builds the CPU target of the Dockerfile on every push to main and on PRs
# that touch Docker-related files. The GPU target is not built in CI because
# it requires CUDA wheels (~8 GB) — verify GPU builds manually.
#
# Layer caching via GitHub Actions cache keeps repeat builds fast (~1–2 min
# after the first cold run).

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - docker-compose.yml
      - .dockerignore
      - pyproject.toml
      - src/**
  pull_request:
    branches: [main]
    paths:
      - Dockerfile
      - docker-compose.yml
      - .dockerignore
      - pyproject.toml
      - src/**

jobs:
  docker-cpu-build:
    name: Build CPU image (smoke test)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build CPU target
        uses: docker/build-push-action@v7
        with:
          context: .
          target: cpu
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Validate docker-compose config
        run: docker compose config --quiet
