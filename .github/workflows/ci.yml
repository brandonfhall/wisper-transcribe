name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"   # weekly latest-deps check — Monday 06:00 UTC

env:
  # Pin the tailwindcss binary to a specific tag so the download URL is
  # /releases/download/v4.2.4/... (cached on the GitHub CDN) instead of
  # /releases/latest/download/... which is redirect-prone and has hit
  # transient HTTP 503/504 in CI.
  TAILWINDCSS_VERSION: v4.2.4

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Only test what we ship: Docker runs 3.14 (python:3.14-slim) and the
        # local-.venv install floor is 3.13. Both are blocking — the version we
        # ship must never be the one allowed to fail.
        python-version: ["3.13", "3.14"]

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true
          cache: "pip"

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Run tests with coverage
        run: pytest tests/ -v --cov --cov-report=term-missing

      - name: Verify Tailwind CSS builds without errors
        run: |
          python -m pytailwindcss \
            -i src/wisper_transcribe/static/input.css \
            -o /tmp/tailwind-ci.min.css \
            --minify

  latest-deps:
    name: latest deps (3.14)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          allow-prereleases: true

      - name: Install package with latest dependencies
        run: pip install --upgrade -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v
