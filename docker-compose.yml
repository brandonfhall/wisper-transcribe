name: wisper-transcribe

# ── Quick start ───────────────────────────────────────────────────────────────
# 1. cp .env.example .env  →  fill in HF_TOKEN (and optional API keys)
# 2. make start            →  CPU web UI at http://localhost:8080
#    make start-gpu        →  GPU web UI (requires NVIDIA Container Toolkit)
#
# Local bind-mount directories (created automatically by Docker on first run):
#   ./cache/   — HuggingFace model downloads (~2 GB, persisted across restarts)
#   ./data/    — wisper config.toml + speaker profiles (persisted)
#   ./input/   — place your audio files here before running
#   ./output/  — transcribed .md files appear here
# ─────────────────────────────────────────────────────────────────────────────

# Shared volume and env blocks reused by every service
x-volumes: &volumes
  - ./cache:/root/.cache/huggingface   # HF model cache
  - ./data:/data                       # config + speaker profiles
  - ./input:/app/input                 # audio input
  - ./output:/app/output               # transcript output
  - ./recordings:/data/recordings      # Discord recording storage

x-env: &env
  WISPER_DATA_DIR: /data
  # Token and API keys are read from .env (copy .env.example → .env)
  HF_TOKEN: ${HF_TOKEN:-}
  HUGGINGFACE_TOKEN: ${HF_TOKEN:-}
  DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}

services:

  # ── GPU CLI ───────────────────────────────────────────────────────────────
  # docker compose run wisper wisper transcribe /app/input/session.mp3
  wisper:
    build:
      context: .
      target: gpu
    image: wisper-transcribe:gpu
    volumes: *volumes
    environment: *env
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    stdin_open: true
    tty: true

  # ── CPU CLI ───────────────────────────────────────────────────────────────
  # docker compose run wisper-cpu wisper transcribe /app/input/session.mp3
  wisper-cpu:
    build:
      context: .
      target: cpu
    image: wisper-transcribe:cpu
    volumes: *volumes
    environment: *env
    stdin_open: true
    tty: true

  # ── GPU web UI ────────────────────────────────────────────────────────────
  # make start-gpu  →  http://localhost:8080
  wisper-web:
    build:
      context: .
      target: gpu
    image: wisper-transcribe:gpu
    command: ["server", "--host", "0.0.0.0", "--port", "8080"]
    ports:
      - "8080:8080"
    volumes: *volumes
    environment: *env
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # ── CPU web UI ────────────────────────────────────────────────────────────
  # make start  →  http://localhost:8080
  wisper-cpu-web:
    build:
      context: .
      target: cpu
    image: wisper-transcribe:cpu
    command: ["server", "--host", "0.0.0.0", "--port", "8080"]
    ports:
      - "8080:8080"
    volumes: *volumes
    environment: *env
